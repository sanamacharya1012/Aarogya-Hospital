{% extends "base.html" %}
{% block content %}
<div class="card p-4 shadow-sm">
    <h3 class="fw-bold mb-2">Assign Doctor</h3>
    <p class="text-muted mb-3">
        Patient: {{ patient.full_name }} ({{ patient.patient_id }})
    </p>
    <form method="post">
        {% csrf_token %}
        <label class="form-label">Doctor</label>
        {{ form.assigned_doctor }}
        <div class="mt-3 d-flex gap-2">
            <button class="btn btn=-outline-success">Save</button>
            <a class="btn btn-outline-secondary" href="{% url 'patient_detail' patient.patient_id %}">Back</a>
        </div>
    </form>
</div>
<script>
    document.querrySelectorAll("select").forEach(el => el.classList.add("form-conntrol"));
</script>

{% endblock %}
