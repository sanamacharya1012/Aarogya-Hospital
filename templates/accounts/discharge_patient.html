{% extends "base.html" %}
{% block content %}
<div class="card p-4 shadow-sm">
  <h3 class="fw-bold mb-1">Discharge Patient</h3>
  <p class="text-muted mb-3">
    {{ admission.patient.patient_id }} • {{ admission.patient.full_name }}
  </p>

  <div class="alert alert-warning">
    Are you sure you want to discharge this patient?
  </div>

  <form method="post">
    {% csrf_token %}
    <button class="btn btn-danger">Yes, Discharge</button>
    <a class="btn btn-outline-secondary" href="{% url 'patient_list' %}">Cancel</a>
  </form>
</div>
{% endblock %}
