{% extends "base.html" %}
{% block content %}
<div class="card p-4 shadow-sm">
  <h3 class="fw-bold mb-1">Add Payment</h3>
  <div class="text-muted mb-3">{{ inv.invoice_no }} • Due: <strong>{{ inv.due_amount }}</strong></div>

  <form method="post">
    {% csrf_token %}
    <div class="row g-3">
      <div class="col-md-4">
        <label class="form-label">Amount</label>
        {{ form.amount }}
      </div>
      <div class="col-md-4">
        <label class="form-label">Method</label>
        {{ form.method }}
      </div>
      <div class="col-md-12">
        <label class="form-label">Note</label>
        {{ form.note }}
      </div>
    </div>

    <div class="mt-4 d-flex gap-2">
      <button class="btn btn-success">Receive</button>
      <a class="btn btn-outline-secondary" href="{% url 'invoice_detail' inv.id %}">Cancel</a>
    </div>
  </form>
</div>

<script>
  document.querySelectorAll("input, select, textarea").forEach(el => {
    if (el.tagName === "SELECT") el.classList.add("form-select");
    else el.classList.add("form-control");
  });
</script>
{% endblock %}
